[service]
name = "stock-sum"
timezone = "UTC"
collector_concurrency = 1

[server]
host = "127.0.0.1"
port = 8000
blacklisted_ips = []
management_allow_remote = false
artifact_dir = "data/http_jobs"
job_retention_hours = 24
max_in_memory_jobs = 200
report_cache_ttl_seconds = 21600
coalesce_inflight_reports = true

[storage]
sqlite_path = "data/stock_sum.sqlite3"

[media]
download_enabled = false
root_dir = "data/media"
max_bytes = 1000000
timeout_seconds = 20
allowed_content_types = ["image/jpeg", "image/png", "image/gif", "image/webp"]

[retention]
enabled = true
max_total_bytes = 268435456
prune_after_pipeline = true

[report_input]
max_x_posts_per_source = 100
max_reddit_posts_per_source = 100
max_reddit_comments_per_post = 10

[models_dev]
api_url = "https://models.dev/api.json"
catalog_url = "https://models.dev/catalog.json"
cache_path = "data/cache/models_dev_api.json"
refresh_interval_hours = 24

[providers.xpoz]
api_key_env = "XPOZ_API_KEY"
server_url = "https://mcp.xpoz.ai/mcp"
timeout_seconds = 60
max_concurrent_requests = 1

[providers.reddit_rss]
base_url = "https://www.reddit.com"
user_agent = "stock-sum/0.1"
timeout_seconds = 30
listing_limit = 100
comment_feed_limit = 500
retry_delay_seconds = 60
max_retries = 2
total_timeout_seconds = 72000

[providers.nitter_rss]
base_url = "https://nitter.net"
user_agent = "stock-sum/0.1"
timeout_seconds = 30
listing_limit = 100
retry_delay_seconds = 60
max_retries = 2
total_timeout_seconds = 72000

[providers.adanos]
api_key_env = "ADANOS_API_KEY"
base_url = "https://api.adanos.org"
timeout_seconds = 30
max_concurrent_requests = 4
response_cache_ttl_seconds = 43200

[llm]
provider = "deepseek"
model = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com"
timeout_seconds = 60
temperature = 0.2
max_tokens = 5000
thinking_enabled = true
analysis_x_posts_per_chunk = 10
analysis_max_chars_per_chunk = 12000
analysis_max_concurrency = 1

[sources.house_ptr]
enabled = true
year = 0
refresh_ttl_seconds = 21600
download_concurrency = 1
parse_concurrency = 1
zip_url_template = "https://disclosures-clerk.house.gov/public_disc/financial-pdfs/{year}FD.zip"
pdf_url_template = "https://disclosures-clerk.house.gov/public_disc/ptr-pdfs/{year}/{doc_id}.pdf"

[sources.sec_13f]
enabled = true
page_url = "https://www.sec.gov/data-research/sec-markets-data/form-13f-data-sets"
refresh_ttl_seconds = 21600
download_timeout_seconds = 120
user_agent = "stock-sum/0.1 contact@example.com"
