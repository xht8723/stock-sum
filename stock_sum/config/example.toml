[service]
name = "stock-sum"
timezone = "America/Vancouver"
collector_concurrency = 3

[server]
host = "127.0.0.1"
port = 8000
blacklisted_ips = []
management_allow_remote = false
artifact_dir = "data/http_jobs"
job_retention_hours = 24
report_cache_ttl_seconds = 3600

[storage]
sqlite_path = "data/stock_sum.sqlite3"

[media]
download_enabled = false
root_dir = "data/media"
max_bytes = 5000000
timeout_seconds = 20
allowed_content_types = ["image/jpeg", "image/png", "image/gif", "image/webp"]

[retention]
enabled = true
max_total_bytes = 2147483648
prune_after_pipeline = true

[models_dev]
api_url = "https://models.dev/api.json"
catalog_url = "https://models.dev/catalog.json"
cache_path = "data/cache/models_dev_api.json"
refresh_interval_hours = 24

[playwright]
browser = "chromium"
channel = "chromium"
headless = true
timeout_seconds = 30

[playwright.x]
base_url = "https://x.com"
max_scrolls = 12
selector_timeout_seconds = 10
page_settle_ms = 1500
scroll_pause_ms = 1200

[providers.xpoz]
api_key_env = "XPOZ_API_KEY"
server_url = "https://mcp.xpoz.ai/mcp"
timeout_seconds = 60
max_concurrent_requests = 2

[llm]
provider = "deepseek"
model = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com"
timeout_seconds = 60
temperature = 0.2
max_tokens = 5000
thinking_enabled = false
analysis_x_posts_per_chunk = 10
analysis_max_chars_per_chunk = 12000
analysis_max_concurrency = 5

[reports.default]
timezone = "America/Vancouver"
schedule = "0 8 * * 1-5"
collector_ids = ["x.aleabitoreddit", "reddit.wallstreetbets"]
delivery_ids = ["email.primary"]

[[sources.x_users]]
enabled = true
handle = "aleabitoreddit"
limit = 100
lookback_hours = 24

[[sources.subreddits]]
enabled = true
subreddit = "wallstreetbets"
sort = "new"
timeframe = "day"
limit = 100
lookback_hours = 24
trim = true
include_comments = true
comments_per_post = 10

[delivery.email.primary]
kind = "email"
enabled = false
smtp_host = "smtp.example.com"
smtp_port = 587
username_env = "SMTP_USERNAME"
password_env = "SMTP_PASSWORD"
from_address = "reports@example.com"
to_addresses = ["user@example.com"]

[delivery.whatsapp.primary]
kind = "whatsapp"
enabled = false
provider = "twilio"
account_sid_env = "TWILIO_ACCOUNT_SID"
auth_token_env = "TWILIO_AUTH_TOKEN"
from_number_env = "TWILIO_WHATSAPP_FROM"
to_numbers = ["whatsapp:+10000000000"]
