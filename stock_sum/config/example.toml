[service]
name = "stock-sum"
timezone = "America/Vancouver"

[storage]
sqlite_path = "data/stock_sum.sqlite3"

[models_dev]
api_url = "https://models.dev/api.json"
catalog_url = "https://models.dev/catalog.json"
cache_path = "data/cache/models_dev_api.json"
refresh_interval_hours = 24

[playwright]
browser = "chromium"
channel = ""
headless = true
timeout_seconds = 30

[providers.scrape_creators]
api_key_env = "SCRAPE_CREATORS_API_KEY"
base_url = "https://api.scrapecreators.com"
timeout_seconds = 30

[llm]
provider = "openai"
model = "gpt-4.1-mini"
api_key_env = "OPENAI_API_KEY"

[reports.default]
timezone = "America/Vancouver"
schedule = "0 8 * * 1-5"
collector_ids = []
delivery_ids = ["email.primary"]

[[sources.x_users]]
enabled = false
handle = "aleabitoreddit"
limit = 10
trim = true

[[sources.subreddits]]
enabled = false
subreddit = "wallstreetbets"
sort = "new"
timeframe = "day"
limit = 10
trim = true
include_comments = false
comments_per_post = 0

[delivery.email.primary]
kind = "email"
enabled = false
smtp_host = "smtp.example.com"
smtp_port = 587
username_env = "SMTP_USERNAME"
password_env = "SMTP_PASSWORD"
from_address = "reports@example.com"
to_addresses = ["user@example.com"]

[delivery.whatsapp.primary]
kind = "whatsapp"
enabled = false
provider = "twilio"
account_sid_env = "TWILIO_ACCOUNT_SID"
auth_token_env = "TWILIO_AUTH_TOKEN"
from_number_env = "TWILIO_WHATSAPP_FROM"
to_numbers = ["whatsapp:+10000000000"]
